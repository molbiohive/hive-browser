# Hive Browser Configuration
# Copy this file to config.local.yaml and adjust values.
# Select config via: HIVE_CONFIG=config/config.local.yaml

version: 4

server:
  host: "0.0.0.0"
  port: 8080

database:
  url: "postgresql+asyncpg://hive:hive@localhost:5432/hive"

llm:
  models:
    - provider: "ollama"
      model: "qwen2.5:7b"
      base_url: "http://localhost:11434/v1"
    # - provider: "anthropic"
    #   model: "claude-sonnet-4-20250514"
    #   api_key: "sk-ant-..."
    # - provider: "openai"
    #   model: "gpt-4o"
    #   api_key: "sk-..."
    # - provider: "openai"           # vLLM (OpenAI-compatible)
    #   model: "Qwen/Qwen3-32B-AWQ"
    #   base_url: "http://localhost:8000/v1"
  auto_discover: false          # auto-discover Ollama models at runtime
  agent_max_turns: 10           # max tool-call turns in agentic loop
  summary_token_limit: 1000     # max tokens for tool result summaries sent to LLM
  tool_rag_enabled: true        # planning call + RAG tool selection
  tool_rag_model: ""            # embedding model ("ollama/nomic-embed-text") or "" for TF-IDF
  tool_rag_base_url: ""         # embedding API base URL (litellm api_base)
  tool_rag_threshold: 0.3       # min cosine similarity to include a tool
  tool_rag_top_k: 8             # max tools returned by RAG
  sandbox_max_retries: 3         # max consecutive sandbox errors before LLM gives up

deps:
  blast:
    bin_dir: ""                # empty = use PATH; or set to /usr/local/bin etc.
    default_evalue: 1e-5
    default_max_hits: 50
  mafft:
    bin_dir: ""                # empty = use PATH

tools:
  search:
    columns: [name, size_bp, topology, features]  # fields shown in search results

logging:
  level: "INFO"                # root log level (DEBUG, INFO, WARNING, ERROR)
  llm_dump: false              # write full LLM payloads to llm.jsonl

chat:
  max_history_pairs: 20        # LLM conversation memory depth
  auto_save_after: 2           # save chat after N user messages

watcher:
  root: ~/sequences          # directory to watch for sequence files
  recursive: true
  poll_interval: 5

  rules:
    - match: "*.dna"
      action: parse
      parser: sgffp
      extract: [sequence, features, primers, notes]

    - match: "*.rna"
      action: parse
      parser: sgffp
      extract: [sequence, features, primers, notes]

    - match: "*.prot"
      action: parse
      parser: sgffp
      extract: [sequence, features, primers, notes]

    - match: "*.gb"
      action: parse
      parser: biopython
      extract: [sequence, features, description]

    - match: "*.gbk"
      action: parse
      parser: biopython
      extract: [sequence, features, description]

    - match: "*.fasta"
      action: parse
      parser: biopython
      extract: [sequence]

    - match: "*.fa"
      action: parse
      parser: biopython
      extract: [sequence]

    - match: "*.zrt"
      action: parse
      parser: sgffp
      extract: [alignment]

    - match: "*.pdf"
      action: ignore

    - match: "*.docx"
      action: ignore

    - match: "*.png"
      action: ignore

    - match: "*.jpg"
      action: ignore

    - match: ".*"
      action: ignore

    - match: "*"
      action: log
      message: "Unknown file type, skipping"
